# ========================
# edutrack Application Config
# ========================

# Server
server.port=8080

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edutrack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Auto-execute data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=${JWT_SECRET:edutrackSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024}
jwt.expiration=86400000

# Logging
logging.level.com.edutrack=DEBUG
logging.level.org.springframework.security=DEBUG

# Email Config (Gmail Example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:YOUR_EMAIL@gmail.com}
spring.mail.password=${MAIL_PASS:YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
